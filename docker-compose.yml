services:
  postgres:
    image: postgres:15-alpine
    container_name: shredder-postgres
    environment:
      POSTGRES_USER: shredder
      POSTGRES_PASSWORD: shredder
      POSTGRES_DB: shredder
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shredder -d shredder"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
